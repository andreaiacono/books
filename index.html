<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBooks — Library</title>
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.dataset.theme=t;})();</script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">MyBooks</a>
  <ul class="nav__links">
    <li><a href="index.html" class="active">Library</a></li>
    <li><a href="reading-log.html">Reading Log</a></li>
    <li><a href="add.html">Add Book</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
  <div class="nav__actions">
    <button id="theme-toggle" class="theme-toggle">☀</button>
    <a href="add.html" class="btn btn--primary" style="padding:0.4rem 1rem;font-size:13px">+ Add</a>
  </div>
</nav>

<main class="page">
  <header class="page-header">
    <h1>My Library</h1>
    <p id="subtitle">Loading…</p>
  </header>

  <div class="search-wrap" style="margin-bottom:1.25rem">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="search" id="search-input" class="search-input"
           placeholder="Building index…" autocomplete="off" disabled>
    <button id="search-clear" class="search-clear" type="button" aria-label="Clear search">&times;</button>
  </div>

  <div id="filter-wrap" style="display:none;margin-bottom:1.25rem">
    <button id="filter-toggle" class="btn btn--ghost" style="font-size:13px;padding:0.35rem 0.85rem">
      Filter by Subject ▾
    </button>
    <div id="filter-bar" class="filter-bar" style="display:none;margin-top:0.5rem"></div>
  </div>
  <p id="search-count" class="search-count" style="display:none"></p>
  <div id="book-grid"></div>
</main>

<!-- Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunr-languages@1.14.0/lunr.stemmer.support.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunr-languages@1.14.0/lunr.multi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lunr-languages@1.14.0/lunr.it.min.js"></script>

<script type="module">
  import { loadGrid } from './js/data.js';
  import { renderBookCard, showLoader, hideLoader, toast, escHtml } from './js/ui.js';
  import { buildSearchIndex, search, isIndexReady } from './js/search.js';

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  let allBooks = [];
  let searchTimeout = null;
  let activeFilters = new Set();

  async function init() {
    showLoader('Loading your library…');
    try {
      allBooks = await loadGrid();

      document.getElementById('subtitle').textContent = `${allBooks.length} books`;

      buildFilterBar(allBooks);
      renderGrid(allBooks);

      // Build search index after first paint
      setTimeout(() => {
        buildSearchIndex(allBooks);
        const input = document.getElementById('search-input');
        input.disabled = false;
        input.placeholder = 'Title, author, publisher, description…';
      }, 0);

    } catch (err) {
      console.error(err);
      toast('Failed to load library. Check console for details.', 'error');
      document.getElementById('subtitle').textContent = 'Error loading data';
    } finally {
      hideLoader();
    }
  }

  function buildFilterBar(books) {
    const counts = {};
    for (const b of books) {
      const subjects = b.subjects;
      if (Array.isArray(subjects)) {
        for (const s of subjects) {
          counts[s] = (counts[s] || 0) + 1;
        }
      }
    }
    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
    if (!sorted.length) return;

    const wrap = document.getElementById('filter-wrap');
    const bar = document.getElementById('filter-bar');
    const toggle = document.getElementById('filter-toggle');
    wrap.style.display = '';

    toggle.addEventListener('click', () => {
      const open = bar.style.display !== 'none';
      bar.style.display = open ? 'none' : '';
      toggle.textContent = open ? 'Filter by subject ▾' : 'Filter by subject ▴';
    });

    for (const [subject, count] of sorted) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.textContent = `${subject} (${count})`;
      btn.dataset.subject = subject;
      btn.addEventListener('click', () => {
        if (activeFilters.has(subject)) {
          activeFilters.delete(subject);
          btn.classList.remove('filter-btn--active');
        } else {
          activeFilters.add(subject);
          btn.classList.add('filter-btn--active');
        }
        applyFilters();
      });
      bar.appendChild(btn);
    }
  }

  function getFilteredBooks() {
    if (!activeFilters.size) return allBooks;
    return allBooks.filter(b =>
      Array.isArray(b.subjects) && b.subjects.some(s => activeFilters.has(s))
    );
  }

  function applyFilters() {
    const query = document.getElementById('search-input').value.trim();
    const countEl = document.getElementById('search-count');

    if (query) {
      const searchResults = search(query);
      const filtered = activeFilters.size
        ? searchResults.filter(b => Array.isArray(b.subjects) && b.subjects.some(s => activeFilters.has(s)))
        : searchResults;
      countEl.style.display = '';
      countEl.textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
      renderFlat(filtered);
    } else {
      const filtered = getFilteredBooks();
      if (activeFilters.size) {
        countEl.style.display = '';
        countEl.textContent = `${filtered.length} book${filtered.length !== 1 ? 's' : ''}`;
        renderGrid(filtered);
      } else {
        countEl.style.display = 'none';
        renderGrid(allBooks);
      }
    }
  }

  function renderGrid(books) {
    const container = document.getElementById('book-grid');
    container.innerHTML = '';

    if (!books.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📚</div>
          <h2>No books found</h2>
          <p>Try a different filter, or <a href="add.html">add your first book</a>.</p>
        </div>`;
      return;
    }

    const currentYear = new Date().getFullYear().toString();

    // Group by year → month
    const byYear = new Map();
    for (const book of books) {
      const [y, m] = book.added ? book.added.split('-') : [];
      if (y && m) {
        if (!byYear.has(y)) byYear.set(y, new Map());
        const key = `${y}-${m.padStart(2, '0')}`;
        const yearMap = byYear.get(y);
        if (!yearMap.has(key)) yearMap.set(key, { label: MONTHS[parseInt(m) - 1], books: [] });
        yearMap.get(key).books.push(book);
      } else {
        if (!byYear.has('unknown')) byYear.set('unknown', new Map());
        const yearMap = byYear.get('unknown');
        if (!yearMap.has('unknown')) yearMap.set('unknown', { label: 'Unknown date', books: [] });
        yearMap.get('unknown').books.push(book);
      }
    }

    // Sort years descending, unknown last
    const sortedYears = [...byYear.keys()]
      .filter(k => k !== 'unknown')
      .sort((a, b) => b.localeCompare(a));
    if (byYear.has('unknown')) sortedYears.push('unknown');

    const fragment = document.createDocumentFragment();
    for (const yearKey of sortedYears) {
      const monthMap = byYear.get(yearKey);
      const totalInYear = [...monthMap.values()].reduce((n, g) => n + g.books.length, 0);

      const yearSection = document.createElement('section');
      yearSection.className = 'year-section' + (yearKey === currentYear ? '' : ' collapsed');

      const yearHeader = document.createElement('div');
      yearHeader.className = 'year-header';
      yearHeader.innerHTML = `
        <span class="year-chevron">▾</span>
        <h2>${yearKey === 'unknown' ? 'Unknown date' : yearKey}</h2>
        <span class="year-count">${totalInYear} book${totalInYear !== 1 ? 's' : ''}</span>`;
      yearHeader.addEventListener('click', () => yearSection.classList.toggle('collapsed'));

      const yearBody = document.createElement('div');
      yearBody.className = 'year-body';

      // Sort months descending within year
      const sortedMonths = [...monthMap.keys()]
        .filter(k => k !== 'unknown')
        .sort((a, b) => b.localeCompare(a));
      if (monthMap.has('unknown')) sortedMonths.push('unknown');

      for (const monthKey of sortedMonths) {
        const { label, books: monthBooks } = monthMap.get(monthKey);

        const monthGroup = document.createElement('section');
        monthGroup.className = 'month-group';

        const monthHeader = document.createElement('div');
        monthHeader.className = 'month-group__header';
        monthHeader.innerHTML = `
          <span class="month-group__chevron">▾</span>
          <h3 class="month-group__title">${label}</h3>
          <span class="month-group__count">${monthBooks.length} book${monthBooks.length !== 1 ? 's' : ''}</span>`;
        monthHeader.addEventListener('click', () => monthGroup.classList.toggle('collapsed'));

        const grid = document.createElement('div');
        grid.className = 'book-grid';
        for (const book of monthBooks) grid.appendChild(renderBookCard(book));

        monthGroup.appendChild(monthHeader);
        monthGroup.appendChild(grid);
        yearBody.appendChild(monthGroup);
      }

      yearSection.appendChild(yearHeader);
      yearSection.appendChild(yearBody);
      fragment.appendChild(yearSection);
    }
    container.appendChild(fragment);
  }

  function renderFlat(books) {
    const container = document.getElementById('book-grid');
    container.innerHTML = '';

    if (!books.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">🔍</div>
          <h2>No results</h2>
          <p>Try different keywords or check for typos.</p>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'book-grid';
    for (const book of books) grid.appendChild(renderBookCard(book));
    container.appendChild(grid);
  }

  function doSearch(query) {
    applyFilters();
  }

  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  const searchIcon  = document.querySelector('.search-icon');

  function toggleClearBtn() {
    const hasText = searchInput.value.length > 0;
    searchClear.style.display = hasText ? '' : 'none';
    searchIcon.style.display  = hasText ? 'none' : '';
  }

  searchInput.addEventListener('input', e => {
    toggleClearBtn();
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => doSearch(e.target.value), 200);
  });

  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    toggleClearBtn();
    doSearch('');
    searchInput.focus();
  });

  init();
</script>

<script src="js/theme.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/books/sw.js");</script>
</body>
</html>
