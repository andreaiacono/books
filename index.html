<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiblioTrack — Library</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">Biblio<em>Track</em></a>
  <ul class="nav__links">
    <li><a href="index.html" class="active">Library</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="reading-log.html">Reading Log</a></li>
    <li><a href="add.html">Add Book</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
  <div class="nav__actions">
    <a href="add.html" class="btn btn--primary" style="padding:0.4rem 1rem;font-size:13px">+ Add</a>
  </div>
</nav>

<main class="page">
  <header class="page-header">
    <h1>My Library</h1>
    <p id="subtitle">Loading…</p>
  </header>

  <div id="stats-bar" class="stats-bar" style="display:none">
    <div class="stat"><span class="stat__value" id="stat-total">—</span><span class="stat__label">books</span></div>
    <div class="stat"><span class="stat__value" id="stat-read">—</span><span class="stat__label">read</span></div>
    <div class="stat"><span class="stat__value" id="stat-unread">—</span><span class="stat__label">unread</span></div>
    <div class="stat"><span class="stat__value" id="stat-fav">—</span><span class="stat__label">favourites</span></div>
  </div>

  <div id="filter-bar-container"></div>
  <div id="book-grid"></div>
</main>

<style>
  .month-group { margin-bottom: 2.5rem; }

  .month-group__header {
    display: flex; align-items: baseline; gap: 0.75rem;
    padding: 0.5rem 0; border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .month-group__title {
    font-family: var(--font-display); font-size: 1.4rem; font-weight: 400;
  }
  .month-group__count {
    font-size: 13px; color: var(--text-muted); font-family: var(--font-mono);
  }
</style>

<!-- Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>

<script type="module">
  import { getEnrichedCatalog } from './js/data.js';
  import { renderBookCard, buildFilterBar, applyFilterSort, showLoader, hideLoader, toast } from './js/ui.js';

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  let allBooks = [];

  async function init() {
    showLoader('Loading your library…');
    try {
      allBooks = await getEnrichedCatalog();

      // Stats
      const readCount   = allBooks.filter(b => b.reading).length;
      const markedCount = allBooks.filter(b => b.reading?.marked).length;
      document.getElementById('stat-total').textContent  = allBooks.length;
      document.getElementById('stat-read').textContent   = readCount;
      document.getElementById('stat-unread').textContent = allBooks.length - readCount;
      document.getElementById('stat-fav').textContent    = markedCount;
      document.getElementById('stats-bar').style.display = '';
      document.getElementById('subtitle').textContent =
        `${allBooks.length} books · ${readCount} read`;

      // Filter bar
      const filterBar = buildFilterBar((filter, sort) => {
        renderGrid(applyFilterSort(allBooks, filter, sort));
      });
      document.getElementById('filter-bar-container').appendChild(filterBar);

      // Initial render sorted by title
      renderGrid(applyFilterSort(allBooks, 'all', 'title'));

    } catch (err) {
      console.error(err);
      toast('Failed to load library. Check console for details.', 'error');
      document.getElementById('subtitle').textContent = 'Error loading data';
    } finally {
      hideLoader();
    }
  }

  function renderGrid(books) {
    const container = document.getElementById('book-grid');
    container.innerHTML = '';

    if (!books.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📚</div>
          <h2>No books found</h2>
          <p>Try a different filter, or <a href="add.html">add your first book</a>.</p>
        </div>`;
      return;
    }

    // Group by month read; unread books go last
    const groups = new Map(); // key: 'YYYY-MM' | 'unread'
    for (const book of books) {
      const date = book.reading?.dateFinished;
      if (date) {
        const [, m, y] = date.split('/');
        const key = `${y}-${m.padStart(2, '0')}`;
        if (!groups.has(key)) {
          groups.set(key, { label: `${MONTHS[parseInt(m) - 1]} ${y}`, books: [] });
        }
        groups.get(key).books.push(book);
      } else {
        if (!groups.has('unread')) groups.set('unread', { label: 'Unread', books: [] });
        groups.get('unread').books.push(book);
      }
    }

    // Sort groups: dated ones descending, unread at the end
    const sortedKeys = [...groups.keys()]
      .filter(k => k !== 'unread')
      .sort((a, b) => b.localeCompare(a));
    if (groups.has('unread')) sortedKeys.push('unread');

    const fragment = document.createDocumentFragment();
    for (const key of sortedKeys) {
      const { label, books: groupBooks } = groups.get(key);

      const section = document.createElement('section');
      section.className = 'month-group';
      section.innerHTML = `
        <div class="month-group__header">
          <h2 class="month-group__title">${label}</h2>
          <span class="month-group__count">${groupBooks.length} book${groupBooks.length !== 1 ? 's' : ''}</span>
        </div>`;

      const grid = document.createElement('div');
      grid.className = 'book-grid';
      for (const book of groupBooks) grid.appendChild(renderBookCard(book));
      section.appendChild(grid);
      fragment.appendChild(section);
    }
    container.appendChild(fragment);
  }

  init();
</script>

<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
