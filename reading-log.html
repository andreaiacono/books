<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblio — Reading Log</title>
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.dataset.theme=t;})();</script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">Biblio</a>
  <ul class="nav__links">
    <li><a href="index.html">Library</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="reading-log.html" class="active">Reading Log</a></li>
    <li><a href="add.html">Add Book</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
  <div class="nav__actions">
    <button id="theme-toggle" class="theme-toggle">☀</button>
  </div>
</nav>

<main class="page">
  <header class="page-header">
    <h1>Reading Log</h1>
    <p id="log-subtitle">Loading…</p>
  </header>

  <div id="log-stats" class="stats-bar" style="display:none">
    <div class="stat"><span class="stat__value" id="ls-total">—</span><span class="stat__label">books read</span></div>
    <div class="stat"><span class="stat__value" id="ls-years">—</span><span class="stat__label">years tracked</span></div>
    <div class="stat"><span class="stat__value" id="ls-fav">—</span><span class="stat__label">favourites</span></div>
    <div class="stat"><span class="stat__value" id="ls-rate">—</span><span class="stat__label">books/month avg</span></div>
  </div>

  <div id="log-container"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script type="module">
  import { escHtml } from './js/ui.js';

  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                     'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  async function init() {
    const res = await fetch('data/reading-log.csv');
    const text = await res.text();
    const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });

    // Sort descending by date
    const sorted = data.sort((a, b) => parseDate(b.date) - parseDate(a.date));

    // Stats
    const total   = sorted.length;
    const favs    = sorted.filter(r => r.marked === 'true').length;
    const years   = new Set(sorted.map(r => r.date?.slice(-4))).size;
    // Rate: total / months spanned
    const dates   = sorted.map(r => parseDate(r.date)).filter(d => !isNaN(d));
    const spanMs  = Math.max(...dates) - Math.min(...dates);
    const months  = Math.max(1, Math.round(spanMs / (1000 * 60 * 60 * 24 * 30.4)));
    const rate    = (total / months).toFixed(1);

    document.getElementById('ls-total').textContent = total;
    document.getElementById('ls-years').textContent = years;
    document.getElementById('ls-fav').textContent   = favs;
    document.getElementById('ls-rate').textContent  = rate;
    document.getElementById('log-stats').style.display = '';
    document.getElementById('log-subtitle').textContent =
      `${total} books across ${years} years`;

    // Group by month
    const byMonth = new Map();
    for (const entry of sorted) {
      const date = entry.date;
      const key = date ? date.slice(3) : 'unknown'; // "MM/YYYY"
      if (!byMonth.has(key)) {
        const label = date
          ? `${MONTHS_IT[parseInt(date.slice(3, 5)) - 1]} ${date.slice(6)}`
          : 'Data sconosciuta';
        byMonth.set(key, { label, entries: [] });
      }
      byMonth.get(key).entries.push(entry);
    }

    const container = document.getElementById('log-container');

    for (const { label, entries } of byMonth.values()) {
      const section = document.createElement('section');
      section.className = 'month-section';
      section.innerHTML = `<div class="month-header">${escHtml(label)}</div>`;

      for (const entry of entries) {
        const isbn   = entry.isbn?.trim();
        const marked = entry.marked === 'true';
        const title  = escHtml(entry.title ?? '');
        const author = escHtml(entry.creators ?? '');
        const comment = entry.comment?.trim();

        const titleEl = isbn
          ? `<a class="log-title${marked ? ' log-title--marked' : ''}" href="https://books.google.it/books?vid=${encodeURIComponent(isbn)}" target="_blank" rel="noopener">${title}</a>`
          : `<strong class="log-title${marked ? ' log-title--marked' : ''}">${title}</strong>`;

        const row = document.createElement('p');
        row.className = 'log-entry';
        row.innerHTML = `<span class="log-date">${escHtml(entry.date ?? '')}</span>${titleEl} di ${author}${comment ? `: <span class="log-comment">${escHtml(comment)}</span>` : ''}`;
        section.appendChild(row);
      }

      container.appendChild(section);
    }
  }

  function parseDate(str) {
    if (!str) return NaN;
    const [d, m, y] = str.split('/');
    return new Date(+y, +m - 1, +d).getTime();
  }

  init();
</script>

<script src="js/theme.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
