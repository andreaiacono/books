<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BiblioTrack — Reading Log</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">Biblio<em>Track</em></a>
  <ul class="nav__links">
    <li><a href="index.html">Library</a></li>
    <li><a href="search.html">Search</a></li>
    <li><a href="reading-log.html" class="active">Reading Log</a></li>
    <li><a href="add.html">Add Book</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
</nav>

<main class="page">
  <header class="page-header">
    <h1>Reading Log</h1>
    <p id="log-subtitle">Loading…</p>
  </header>

  <div id="log-stats" class="stats-bar" style="display:none">
    <div class="stat"><span class="stat__value" id="ls-total">—</span><span class="stat__label">books read</span></div>
    <div class="stat"><span class="stat__value" id="ls-years">—</span><span class="stat__label">years tracked</span></div>
    <div class="stat"><span class="stat__value" id="ls-fav">—</span><span class="stat__label">favourites</span></div>
    <div class="stat"><span class="stat__value" id="ls-rate">—</span><span class="stat__label">books/month avg</span></div>
  </div>

  <div id="log-container"></div>
</main>

<style>
  .year-section { margin-bottom: 2.5rem; }

  .year-header {
    display: flex; align-items: baseline; gap: 0.75rem;
    cursor: pointer; user-select: none;
    padding: 0.5rem 0; border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .year-header h2 {
    font-family: var(--font-display); font-size: 1.6rem; font-weight: 400;
  }
  .year-header .year-count {
    font-size: 13px; color: var(--text-muted); font-family: var(--font-mono);
  }
  .year-header .year-chevron {
    margin-left: auto; color: var(--text-faint); transition: transform 0.2s ease;
  }
  .year-section.collapsed .year-chevron { transform: rotate(-90deg); }
  .year-section.collapsed .year-books   { display: none; }

  .month-divider {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-faint); padding: 0.5rem 0 0.5rem;
    margin-top: 0.75rem;
  }

  .log-entry {
    display: grid; grid-template-columns: 48px 1fr;
    gap: 0.75rem; align-items: start;
    padding: 0.6rem 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .log-entry:hover { background: var(--bg-raised); padding-left: 0.5rem; }
  .log-entry:last-child { border-bottom: none; }

  .log-thumb {
    width: 48px; height: 72px; object-fit: cover;
    border-radius: 3px; border: 1px solid var(--border);
    background: var(--bg-raised);
  }

  .log-info { display: flex; flex-direction: column; gap: 0.2rem; }
  .log-title {
    font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; line-height: 1.3;
  }
  .log-title.marked { color: var(--fav-gold); }
  .log-author { font-size: 13px; color: var(--text-muted); }
  .log-date   { font-size: 12px; color: var(--text-faint); font-family: var(--font-mono); }
  .log-comment {
    font-style: italic; font-size: 13px; color: var(--text-muted);
    margin-top: 0.15rem; line-height: 1.4;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script type="module">
  import { loadReadingLog, loadGrid } from './js/data.js';
  import { escHtml, formatDate } from './js/ui.js';

  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                     'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  async function init() {
    const [readMap, grid] = await Promise.all([loadReadingLog(), loadGrid()]);

    // Build cover lookup from catalog
    const coverMap = new Map(grid.map(b => [b.isbn, b.cover]));

    // Parse reading log entries back to array
    const entries = [];
    readMap.forEach((v, isbn) => entries.push({ ...v, isbn }));

    // Also pull entries without ISBNs from raw CSV (readMap only has ISBNed entries)
    // Re-parse CSV to get all entries including those without ISBNs
    const res = await fetch('data/reading-log.csv');
    const text = await res.text();
    const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });

    // Sort descending by date
    const sorted = data.sort((a, b) => parseDate(b.date) - parseDate(a.date));

    // Stats
    const total   = sorted.length;
    const favs    = sorted.filter(r => r.marked === 'true').length;
    const years   = new Set(sorted.map(r => r.date?.slice(-4))).size;
    // Rate: total / months spanned
    const dates   = sorted.map(r => parseDate(r.date)).filter(d => !isNaN(d));
    const spanMs  = Math.max(...dates) - Math.min(...dates);
    const months  = Math.max(1, Math.round(spanMs / (1000 * 60 * 60 * 24 * 30.4)));
    const rate    = (total / months).toFixed(1);

    document.getElementById('ls-total').textContent = total;
    document.getElementById('ls-years').textContent = years;
    document.getElementById('ls-fav').textContent   = favs;
    document.getElementById('ls-rate').textContent  = rate;
    document.getElementById('log-stats').style.display = '';
    document.getElementById('log-subtitle').textContent =
      `${total} books across ${years} years`;

    // Group by year
    const byYear = new Map();
    for (const entry of sorted) {
      const y = entry.date?.slice(-4) ?? 'Unknown';
      if (!byYear.has(y)) byYear.set(y, []);
      byYear.get(y).push(entry);
    }

    const container = document.getElementById('log-container');

    for (const [year, books] of byYear) {
      const section = document.createElement('section');
      section.className = 'year-section';

      const header = document.createElement('div');
      header.className = 'year-header';
      header.innerHTML = `
        <h2>${escHtml(year)}</h2>
        <span class="year-count">${books.length} books</span>
        <span class="year-chevron">▾</span>`;
      header.addEventListener('click', () => section.classList.toggle('collapsed'));

      const booksDiv = document.createElement('div');
      booksDiv.className = 'year-books';

      let lastMonth = null;

      for (const entry of books) {
        const month = getMonth(entry.date);
        if (month !== lastMonth) {
          const div = document.createElement('div');
          div.className = 'month-divider';
          div.textContent = month;
          booksDiv.appendChild(div);
          lastMonth = month;
        }

        const isbn   = entry.isbn?.trim();
        const cover  = isbn ? (coverMap.get(isbn) ?? null) : null;
        const marked = entry.marked === 'true';

        const row = document.createElement('div');
        row.className = 'log-entry';
        if (isbn) {
          row.style.cursor = 'pointer';
          row.addEventListener('click', () => window.location.href = `book.html?isbn=${encodeURIComponent(isbn)}`);
        }

        row.innerHTML = `
          <img class="log-thumb"
               src="${cover ? escHtml(cover) : 'assets/no-cover.svg'}"
               alt=""
               onerror="this.src='assets/no-cover.svg'">
          <div class="log-info">
            <span class="log-title${marked ? ' marked' : ''}">
              ${marked ? '★ ' : ''}${escHtml(entry.title ?? '')}
            </span>
            <span class="log-author">${escHtml(entry.creators ?? '')}</span>
            <span class="log-date">${formatDate(entry.date)}</span>
            ${entry.comment ? `<span class="log-comment">${escHtml(entry.comment)}</span>` : ''}
          </div>`;

        booksDiv.appendChild(row);
      }

      section.appendChild(header);
      section.appendChild(booksDiv);
      container.appendChild(section);
    }
  }

  function parseDate(str) {
    if (!str) return NaN;
    const [d, m, y] = str.split('/');
    return new Date(+y, +m - 1, +d).getTime();
  }

  function getMonth(str) {
    if (!str) return 'Unknown';
    const [, m, y] = str.split('/');
    return `${MONTHS_IT[parseInt(m) - 1]} ${y}`;
  }

  init();
</script>

<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/sw.js");</script>
</body>
</html>
