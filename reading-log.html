<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBooks — Reading Log</title>
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.dataset.theme=t;})();</script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">MyBooks</a>
  <ul class="nav__links">
    <li><a href="index.html">Library</a></li>
    <li><a href="index.html">Search</a></li>
    <li><a href="reading-log.html" class="active">Reading Log</a></li>
    <li><a href="add.html">Add Book</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
  <div class="nav__actions">
    <button id="theme-toggle" class="theme-toggle">☀</button>
  </div>
</nav>

<main class="page">
  <header class="page-header" style="display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:0.5rem">
    <div>
      <h1>Reading Log</h1>
      <p id="log-subtitle">Loading…</p>
    </div>
    <button id="add-entry-toggle" class="btn btn--primary" style="font-size:13px;padding:0.4rem 1rem">+ Add entry</button>
  </header>

  <div id="add-entry-form" style="display:none;margin-bottom:2rem;padding:1.25rem;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-lg)">
    <h3 style="font-family:var(--font-display);font-weight:400;font-size:1.1rem;margin-bottom:1rem">New reading entry</h3>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="le-title">Title *</label>
        <input type="text" id="le-title" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="le-author">Author(s)</label>
        <input type="text" id="le-author">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="le-date">Date finished</label>
        <input type="date" id="le-date">
      </div>
      <div class="form-group">
        <label class="form-label" for="le-isbn">ISBN (optional)</label>
        <input type="text" id="le-isbn" placeholder="e.g. 9780141033570" style="font-family:var(--font-mono);letter-spacing:0.05em">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="le-comment">Comment</label>
      <textarea id="le-comment" rows="2" style="resize:vertical" placeholder="Your thoughts…"></textarea>
    </div>
    <label style="display:flex;align-items:center;gap:0.5rem;font-size:14px;color:var(--text-muted);margin-bottom:1rem;cursor:pointer">
      <input type="checkbox" id="le-marked"> Mark as favourite
    </label>
    <div style="display:flex;gap:0.75rem;align-items:center">
      <button id="le-submit" class="btn btn--primary">Save entry</button>
      <button id="le-cancel" class="btn btn--ghost">Cancel</button>
      <span id="le-status" style="font-size:13px;display:none"></span>
    </div>
  </div>

  <div id="log-container"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script type="module">
  import { appendReadingLogEntry, isConfigured } from './js/data.js';
  import { escHtml, toast } from './js/ui.js';

  const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                     'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

  async function init() {
    const res = await fetch('data/reading-log.csv');
    const text = await res.text();
    const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });

    // Sort descending by date
    const sorted = data.sort((a, b) => parseDate(b.date) - parseDate(a.date));

    // Stats
    const total   = sorted.length;
    const favs    = sorted.filter(r => r.marked === 'true').length;
    const years   = new Set(sorted.map(r => r.date?.slice(-4))).size;
    // Rate: total / months spanned
    const dates   = sorted.map(r => parseDate(r.date)).filter(d => !isNaN(d));
    const spanMs  = Math.max(...dates) - Math.min(...dates);
    const months  = Math.max(1, Math.round(spanMs / (1000 * 60 * 60 * 24 * 30.4)));
    const rate    = (total / months).toFixed(1);

    document.getElementById('log-subtitle').textContent = `(in green the ones I liked the most)`;

    // Group by year → month
    const byYear = new Map();
    for (const entry of sorted) {
      const date = entry.date;
      const year = date ? date.slice(6) : 'unknown';
      const monthKey = date ? date.slice(3) : 'unknown'; // "MM/YYYY"
      if (!byYear.has(year)) byYear.set(year, new Map());
      const yearMap = byYear.get(year);
      if (!yearMap.has(monthKey)) {
        const monthLabel = date ? MONTHS_IT[parseInt(date.slice(3, 5)) - 1] : 'Data sconosciuta';
        yearMap.set(monthKey, { label: monthLabel, entries: [] });
      }
      yearMap.get(monthKey).entries.push(entry);
    }

    const currentYear = String(new Date().getFullYear());
    const container = document.getElementById('log-container');

    for (const [year, monthMap] of byYear) {
      const totalInYear = [...monthMap.values()].reduce((n, m) => n + m.entries.length, 0);

      const yearSection = document.createElement('section');
      yearSection.className = 'year-section' + (year !== currentYear ? ' collapsed' : '');

      const yearHeader = document.createElement('div');
      yearHeader.className = 'year-header';
      yearHeader.innerHTML = `
        <span class="year-chevron">▾</span>
        <h2>${escHtml(year)}</h2>
        <span class="year-count">${totalInYear} libri</span>`;
      yearHeader.addEventListener('click', () => yearSection.classList.toggle('collapsed'));

      const yearBody = document.createElement('div');
      yearBody.className = 'year-body';

      for (const { label, entries } of monthMap.values()) {
        const monthSection = document.createElement('section');
        monthSection.className = 'month-section';

        const monthHeader = document.createElement('div');
        monthHeader.className = 'month-header';
        monthHeader.innerHTML = `<span class="month-chevron">▾</span><span>${escHtml(label)}</span>`;
        monthHeader.addEventListener('click', () => monthSection.classList.toggle('collapsed'));
        monthSection.appendChild(monthHeader);

        const entriesDiv = document.createElement('div');
        entriesDiv.className = 'month-entries';

        for (const entry of entries) {
          const isbn    = entry.isbn?.trim();
          const marked  = entry.marked === 'true';
          const title   = escHtml(entry.title ?? '');
          const author  = escHtml(entry.creators ?? '');
          const comment = entry.comment?.trim();

          const titleEl = isbn
            ? `<a class="log-title${marked ? ' log-title--marked' : ''}" href="https://books.google.it/books?vid=${encodeURIComponent(isbn)}" target="_blank" rel="noopener">${title}</a>`
            : `<strong class="log-title${marked ? ' log-title--marked' : ''}">${title}</strong>`;

          const row = document.createElement('p');
          row.className = 'log-entry';
          row.innerHTML = `<span class="log-date">${escHtml(entry.date ?? '')}</span>${titleEl} <span class="log-comment"> di </span> ${author}${comment ? `: <span class="log-comment">${escHtml(comment)}</span>` : ''}`;
          entriesDiv.appendChild(row);
        }

        monthSection.appendChild(entriesDiv);
        yearBody.appendChild(monthSection);
      }

      yearSection.appendChild(yearHeader);
      yearSection.appendChild(yearBody);
      container.appendChild(yearSection);
    }
  }

  function parseDate(str) {
    if (!str) return NaN;
    const [d, m, y] = str.split('/');
    return new Date(+y, +m - 1, +d).getTime();
  }

  // ── Add entry form ──────────────────────────────────────────────────────
  function setupAddForm() {
    const toggleBtn = document.getElementById('add-entry-toggle');
    const form = document.getElementById('add-entry-form');
    const dateInput = document.getElementById('le-date');

    // Default date to today
    dateInput.value = new Date().toISOString().slice(0, 10);

    toggleBtn.addEventListener('click', () => {
      if (!isConfigured()) {
        toast('Configure GitHub settings first', 'warning');
        return;
      }
      form.style.display = '';
      toggleBtn.style.display = 'none';
    });

    document.getElementById('le-cancel').addEventListener('click', () => {
      form.style.display = 'none';
      toggleBtn.style.display = '';
    });

    document.getElementById('le-submit').addEventListener('click', async () => {
      const title = document.getElementById('le-title').value.trim();
      if (!title) { toast('Title is required', 'warning'); return; }

      const rawDate = dateInput.value; // YYYY-MM-DD
      const date = rawDate
        ? `${rawDate.slice(8,10)}/${rawDate.slice(5,7)}/${rawDate.slice(0,4)}`
        : `${String(new Date().getDate()).padStart(2,'0')}/${String(new Date().getMonth()+1).padStart(2,'0')}/${new Date().getFullYear()}`;

      const submitBtn = document.getElementById('le-submit');
      const status = document.getElementById('le-status');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';
      status.style.display = '';
      status.style.color = 'var(--text-muted)';
      status.textContent = 'Saving to GitHub…';

      try {
        await appendReadingLogEntry({
          date,
          title,
          comment:  document.getElementById('le-comment').value.trim(),
          creators: document.getElementById('le-author').value.trim(),
          isbn:     document.getElementById('le-isbn').value.trim().replace(/[^0-9X]/gi, ''),
          marked:   document.getElementById('le-marked').checked,
        });
        status.style.color = 'var(--read-green)';
        status.textContent = 'Saved!';
        toast(`Entry for "${title}" saved`, 'success');
        setTimeout(() => location.reload(), 1200);
      } catch (err) {
        status.style.color = 'var(--danger)';
        status.textContent = `Error: ${err.message}`;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save entry';
      }
    });
  }

  setupAddForm();
  init();
</script>

<script src="js/theme.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/books/sw.js");</script>
</body>
</html>
