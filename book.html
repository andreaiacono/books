<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBooks — Book</title>
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.dataset.theme=t;})();</script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">MyBooks</a>
  <ul class="nav__links">
    <li><a href="reading-log.html">Reading Log</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
  <div class="nav__actions">
    <a href="add.html" class="btn btn--primary" style="padding:0.4rem 1rem;font-size:13px">+ Add Book</a>
    <button id="theme-toggle" class="theme-toggle">☀</button>
  </div>
</nav>

<main class="page" style="max-width:900px" id="main-content">
  <div class="empty-state">
    <div class="loader__spinner" style="width:32px;height:32px;margin:0 auto"></div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script type="module">
  import { loadGrid, loadReadingLog } from './js/data.js';
  import { escHtml, formatDate } from './js/ui.js';

  async function init() {
    const params = new URLSearchParams(location.search);
    const isbn = params.get('isbn');
    if (!isbn) { render404(); return; }

    const [grid, readMap] = await Promise.all([
      loadGrid(),
      loadReadingLog(),
    ]);

    const gridEntry = grid.find(b => b.isbn === isbn);
    if (!gridEntry) { render404(); return; }

    const reading = readMap.get(isbn) ?? null;
    const book = { ...gridEntry, reading };

    document.title = `${book.title} — MyBooks`;
    renderBook(book);
  }

  function renderBook(book) {
    const main = document.getElementById('main-content');
    const subjects = Array.isArray(book.subjects) ? book.subjects : [];
    const reading = book.reading;

    main.innerHTML = `
      <div class="book-detail">
        <div>
          <img class="book-detail__cover"
               src="${escHtml(book.cover ?? 'assets/no-cover.svg')}"
               alt="${escHtml(book.title)}"
               onerror="this.src='assets/no-cover.svg'">
        </div>
        <div>
          <h1 class="book-detail__title">${escHtml(book.title)}</h1>
          <p class="book-detail__author">${escHtml(book.author ?? '')}</p>

          <div class="meta-grid">
            ${book.year       ? metaItem('Year', book.year) : ''}
            ${book.publisher  ? metaItem('Publisher', book.publisher) : ''}
            ${book.pages      ? metaItem('Pages', book.pages) : ''}
            ${book.lang       ? metaItem('Language', book.lang.toUpperCase()) : ''}
            ${book.isbn && !book.isbn.startsWith('no-isbn-') ? metaItem('ISBN', `<span style="font-family:var(--font-mono);font-size:12px">${escHtml(book.isbn)}</span>`) : ''}
            ${book.added      ? metaItem('Added', book.added) : ''}
          </div>

          ${subjects.length ? `
            <div class="subjects">
              ${subjects.map(s => `<span class="subject-tag">${escHtml(s)}</span>`).join('')}
            </div>` : ''}

          ${reading ? `
            <div class="reading-block">
              <h3>Your reading record</h3>
              ${reading.dateFinished
                ? `<p class="reading-date">Finished ${formatDate(reading.dateFinished)}</p>`
                : ''}
              ${reading.comment
                ? `<p class="reading-comment">"${escHtml(reading.comment)}"</p>`
                : ''}
              ${reading.marked
                ? `<p class="reading-marked">★ Marked as favourite</p>`
                : ''}
            </div>` : ''}

          ${book.description ? `
            <div class="description">
              ${escHtml(book.description)}
            </div>` : ''}

          <div style="margin-top:1.5rem;display:flex;gap:0.75rem;flex-wrap:wrap">
            ${book.isbn && !book.isbn.startsWith('no-isbn-')
              ? `<a href="https://books.google.it/books?vid=${encodeURIComponent(book.isbn)}"
                    target="_blank" rel="noopener" class="btn btn--ghost" style="font-size:13px">
                   View on Google Books ↗
                 </a>`
              : ''}
            <a href="edit.html?isbn=${encodeURIComponent(book.isbn)}" class="btn btn--ghost" style="font-size:13px">Edit</a>
            <a id="add-log-btn" class="btn btn--ghost" style="font-size:13px">+ Add reading entry</a>
          </div>
        </div>
      </div>
    `;

    // Wire up "Add reading entry" link
    const logParams = new URLSearchParams({
      title: book.title ?? '',
      author: book.author ?? '',
      isbn: book.isbn ?? '',
    });
    document.getElementById('add-log-btn').href = `reading-log.html?${logParams}`;
  }

  function metaItem(label, value) {
    return `<div class="meta-item">
      <span class="meta-item__label">${escHtml(label)}</span>
      <span class="meta-item__value">${value}</span>
    </div>`;
  }

  function render404() {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">📖</div>
        <h2>Book not found</h2>
        <p>This ISBN isn't in your library. <a href="add.html">Add it?</a></p>
      </div>`;
  }

  init();
</script>

<script src="js/theme.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/books/sw.js");</script>
</body>
</html>
