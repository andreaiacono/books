<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBooks — Add Book</title>
  <link rel="stylesheet" href="css/style.css">
  <script>(function(){var t=localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.dataset.theme=t;})();</script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0e0d">
  <style>
    /* ── Search results panel ─────────────────────────────────────────── */
    #results-panel {
      display: none;
      flex-direction: column;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-height: 420px;
      overflow-y: auto;
    }
    #results-panel.visible { display: flex; }

    .result-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.65rem 0.9rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.13s;
      background: var(--bg-card, var(--bg-raised));
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: var(--bg-hover, color-mix(in srgb, var(--accent) 10%, transparent)); }
    .result-item.selected { background: color-mix(in srgb, var(--accent) 15%, transparent); }

    .result-item__thumb {
      width: 40px;
      height: 60px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-raised);
    }
    .result-item__info { flex: 1; min-width: 0; }
    .result-item__title {
      font-size: 13.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .result-item__author {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-item__isbn {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-faint, var(--text-muted));
      margin-top: 3px;
    }
    .result-item__badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* search hint pill below input */
    #search-hint {
      font-size: 11px;
      color: var(--text-faint, var(--text-muted));
      margin-top: 0.25rem;
      margin-bottom: 0.75rem;
      min-height: 1em;
      transition: opacity 0.2s;
    }
    #search-hint .hint-mode {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 10.5px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    #search-hint .hint-mode.isbn {
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    }
    #search-hint .hint-mode.title {
      background: color-mix(in srgb, #7c9 18%, transparent);
      color: #4a9;
      border: 1px solid color-mix(in srgb, #4a9 35%, transparent);
    }

    /* results empty / loading states */
    .results-state {
      padding: 1.1rem 1rem;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav__brand">MyBooks</a>
  <ul class="nav__links">
    <li><a href="reading-log.html">Reading Log</a></li>
    <li><a href="settings.html">Settings</a></li>
  </ul>
  <div class="nav__actions">
    <button id="theme-toggle" class="theme-toggle">☀</button>
  </div>
</nav>

<main class="page" style="max-width:760px">
  <header class="page-header">
    <h1>Add a Book</h1>
    <p>Enter an ISBN <em>or</em> a title to search — or fill in the fields manually.</p>
  </header>

  <!-- ── Unified search input ───────────────────────────────────────── -->
  <div style="display:flex;gap:0.75rem;margin-bottom:0">
    <input type="text" id="search-input"
           placeholder="ISBN or title…"
           style="font-family:var(--font-mono);letter-spacing:0.03em"
           maxlength="200" autocomplete="off" spellcheck="false">
    <button class="btn btn--primary" id="search-btn" style="white-space:nowrap">
      Search
    </button>
  </div>

  <!-- auto-detect hint -->
  <p id="search-hint">&nbsp;</p>

  <!-- ── Results panel ──────────────────────────────────────────────── -->
  <div id="results-panel" role="listbox" aria-label="Search results"></div>

  <p style="margin-bottom:1.75rem;font-size:13px;color:var(--text-muted)">
    No results? <a href="#" id="manual-entry-link" style="color:var(--accent)">Enter details manually</a>
  </p>

  <!-- ── Preview + form ────────────────────────────────────────────── -->
  <div id="form-area" style="display:none">
    <div style="display:grid;grid-template-columns:140px 1fr;gap:1.5rem;margin-bottom:1.5rem" id="preview-row">
      <div>
        <img id="cover-preview" src="assets/no-cover.svg" alt="Cover"
             style="width:140px;height:210px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border)">
        <p style="font-size:11px;color:var(--text-faint);margin-top:0.4rem;text-align:center" id="cover-status"></p>
        <label class="btn btn--ghost" style="font-size:12px;margin-top:0.4rem;display:block;text-align:center;cursor:pointer">
          Upload cover
          <input type="file" id="cover-upload" accept="image/*" style="display:none">
        </label>
      </div>
      <div>
        <div class="form-group">
          <label class="form-label" for="f-title">Title *</label>
          <input type="text" id="f-title" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-author">Author(s) *</label>
          <input type="text" id="f-author" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-year">Year</label>
            <input type="number" id="f-year" min="1000" max="2099">
          </div>
          <div class="form-group">
            <label class="form-label" for="f-isbn-ro">ISBN</label>
            <input type="text" id="f-isbn-ro" style="font-family:var(--font-mono);letter-spacing:0.05em">
          </div>
        </div>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="f-publisher">Publisher</label>
        <input type="text" id="f-publisher">
      </div>
      <div class="form-group">
        <label class="form-label" for="f-pages">Pages</label>
        <input type="number" id="f-pages" min="1">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="f-subject">Subject</label>
      <select id="f-subject">
        <option value="">— None —</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label" for="f-description">Description</label>
      <textarea id="f-description" rows="4" style="resize:vertical"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label" for="f-language">Language</label>
      <input type="text" id="f-language" placeholder="e.g. en">
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
      <button class="btn btn--primary" id="save-btn">Save to Library</button>
      <button class="btn btn--ghost" id="reset-btn">Reset</button>
    </div>

    <div id="save-progress" style="display:none;margin-top:1rem">
      <div style="height:4px;background:var(--bg-raised);border-radius:2px;overflow:hidden">
        <div id="progress-bar" style="height:100%;width:0%;background:var(--accent);transition:width 0.4s ease"></div>
      </div>
      <p id="save-status" style="font-size:13px;color:var(--text-muted);margin-top:0.5rem"></p>
    </div>
  </div>

  <div id="not-configured" style="display:none" class="empty-state">
    <div class="empty-state__icon">⚙️</div>
    <h2>GitHub not configured</h2>
    <p>Set your Personal Access Token and repository in <a href="settings.html">Settings</a> to enable saving books.</p>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script type="module">
  import { fetchISBNMetadata, fetchCoverAsBase64, saveNewBook, isConfigured } from './js/data.js';
  import { toast, escHtml } from './js/ui.js';

  const SUBJECTS = [
    'Art','Biography','Biology','Crafts','Crime','Curiosities','Diary','Drama',
    'Economics','Education','Fiction','Food','History','Geography','Humor','Language',
    'Math','Medicine','Misc','Music','Mythology','Nature','Neuroscience','Philosophy',
    'Photography','Physics','Poetry','Politics','Psychology','Religion','Reportage',
    'Science','Science Fiction','Sociology','Sport','Technology','Travel','War'
  ];

  // Populate subject dropdown
  {
    const sel = document.getElementById('f-subject');
    for (const s of SUBJECTS) {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    }
  }

  // Check GitHub config
  if (!isConfigured()) {
    document.getElementById('not-configured').style.display = 'flex';
    document.getElementById('form-area').style.display = 'none';
  }

  let currentMeta = null;
  let coverBase64  = null;

  // ── Helpers ─────────────────────────────────────────────────────────────

  const ISBN_RE = /^[\d\-]{9,17}[X]?$/i;

  function looksLikeISBN(v) {
    return ISBN_RE.test(v.replace(/\s/g, ''));
  }

  // CORS proxy wrapper
  function proxied(url) {
    return 'https://corsproxy.io/?' + encodeURIComponent(url);
  }

  // ── Auto-detect hint ─────────────────────────────────────────────────────
  const searchInput = document.getElementById('search-input');
  const searchHint  = document.getElementById('search-hint');

  searchInput.addEventListener('input', () => {
    const v = searchInput.value.trim();
    if (!v) { searchHint.innerHTML = '&nbsp;'; return; }
    if (looksLikeISBN(v)) {
      searchHint.innerHTML = '<span class="hint-mode isbn">ISBN</span> — will look up metadata directly';
    } else {
      searchHint.innerHTML = '<span class="hint-mode title">Title</span> — will search IBS catalogue';
    }
  });

  // ── IBS title search ─────────────────────────────────────────────────────

  /**
   * Search IBS via Algolia endpoint, return normalised hit array.
   * IBS Algolia hit fields observed: title, authors (array or string),
   * isbn13, image (cover URL), editor (publisher), anno_pubblicazione (year),
   * numero_pagine (pages), descrizione (description).
   * We log the raw first hit so you can verify field names on first run.
   */
  async function searchIBS(query) {
    const ibsUrl = `https://www.ibs.it/algolia-search?ts=as&query=${encodeURIComponent(query)}&qs=true`;
    const resp = await fetch(proxied(ibsUrl));
    if (!resp.ok) throw new Error(`IBS search failed: ${resp.status}`);
    const data = await resp.json();

    // Log raw response shape for debugging (first hit only)
    const hits = data?.results?.[0]?.hits ?? data?.hits ?? [];
    if (hits.length) console.debug('[IBS] First hit raw:', hits[0]);

    return hits.map(normaliseIBSHit);
  }

  function normaliseIBSHit(hit) {
    // Author: may be array or string
    let author = '';
    if (Array.isArray(hit.authors)) author = hit.authors.join(', ');
    else if (typeof hit.authors === 'string') author = hit.authors;
    else if (typeof hit.autore === 'string') author = hit.autore;

    // Cover: try common field names
    const coverUrl = hit.image ?? hit.immagine ?? hit.cover_image ?? hit.thumbnail ?? null;

    // ISBN: prefer isbn13
    const isbn = (hit.isbn13 ?? hit.isbn ?? hit.ean ?? '').toString().replace(/\D/g, '');

    // Year
    const year = parseInt(hit.anno_pubblicazione ?? hit.year ?? hit.publication_year ?? '') || null;

    return {
      title:       hit.title ?? hit.titolo ?? '',
      author,
      isbn,
      year,
      publisher:   hit.editor ?? hit.editore ?? hit.publisher ?? '',
      pages:       parseInt(hit.numero_pagine ?? hit.pages ?? '') || null,
      description: hit.descrizione ?? hit.description ?? '',
      lang:        hit.lingua ?? hit.language ?? 'it',
      subjects:    hit.categoria ? [hit.categoria] : [],
      coverUrl,
    };
  }

  // ── Render results panel ──────────────────────────────────────────────────

  const resultsPanel = document.getElementById('results-panel');

  function showResultsState(html) {
    resultsPanel.innerHTML = `<div class="results-state">${html}</div>`;
    resultsPanel.classList.add('visible');
  }

  function renderResults(hits) {
    if (!hits.length) {
      showResultsState('No results found. Try a different query or <a href="#" id="manual-entry-link2" style="color:var(--accent)">enter manually</a>.');
      resultsPanel.querySelector('#manual-entry-link2')?.addEventListener('click', openManual);
      return;
    }

    resultsPanel.innerHTML = '';
    resultsPanel.classList.add('visible');

    for (const hit of hits) {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.setAttribute('role', 'option');
      item.setAttribute('tabindex', '0');

      const thumb = hit.coverUrl
              ? `<img class="result-item__thumb" src="${escHtml(proxied(hit.coverUrl))}" alt="" loading="lazy" onerror="this.src='assets/no-cover.svg'">`
              : `<img class="result-item__thumb" src="assets/no-cover.svg" alt="">`;

      const isbnText = hit.isbn ? `<div class="result-item__isbn">${escHtml(hit.isbn)}</div>` : '';
      const yearText = hit.year ? ` <span style="color:var(--text-faint,var(--text-muted));font-weight:400">(${hit.year})</span>` : '';

      item.innerHTML = `
        ${thumb}
        <div class="result-item__info">
          <div class="result-item__title">${escHtml(hit.title)}</div>
          <div class="result-item__author">${escHtml(hit.author)}${yearText}</div>
          ${isbnText}
        </div>
      `;

      item.addEventListener('click', () => selectHit(hit, item));
      item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectHit(hit, item); });

      resultsPanel.appendChild(item);
    }
  }

  async function selectHit(hit, itemEl) {
    // Mark selected
    resultsPanel.querySelectorAll('.result-item').forEach(el => el.classList.remove('selected'));
    itemEl.classList.add('selected');

    currentMeta  = hit;
    coverBase64  = null;
    populateForm(hit);
    document.getElementById('form-area').style.display = '';

    // Fetch cover if available
    if (hit.coverUrl) {
      document.getElementById('cover-status').textContent = 'Downloading cover…';
      document.getElementById('cover-preview').src = 'assets/no-cover.svg';
      try {
        coverBase64 = await fetchCoverAsBase64(hit.coverUrl);
        document.getElementById('cover-preview').src = `data:image/webp;base64,${coverBase64}`;
        document.getElementById('cover-status').textContent = 'Cover ready';
      } catch {
        document.getElementById('cover-status').textContent = 'Cover unavailable';
      }
    } else {
      document.getElementById('cover-preview').src = 'assets/no-cover.svg';
      document.getElementById('cover-status').textContent = '';
    }

    // Scroll form into view smoothly
    document.getElementById('form-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ── Main search handler ───────────────────────────────────────────────────

  async function doSearch() {
    const raw = searchInput.value.trim();
    if (!raw) { toast('Enter an ISBN or title to search', 'warning'); return; }

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.textContent = 'Searching…';
    document.getElementById('form-area').style.display = 'none';

    try {
      if (looksLikeISBN(raw)) {
        // ── ISBN mode: direct metadata lookup ──────────────────────────
        resultsPanel.classList.remove('visible');
        showResultsState('Looking up ISBN…');

        const cleanIsbn = raw.replace(/[^0-9X]/gi, '');
        const meta = await fetchISBNMetadata(cleanIsbn);

        if (!meta) {
          showResultsState('No metadata found for this ISBN. You can <a href="#" id="manual-entry-link3" style="color:var(--accent)">enter manually</a>.');
          resultsPanel.querySelector('#manual-entry-link3')?.addEventListener('click', openManual);
          return;
        }

        // Synthesise a hit-like object and auto-select it
        const hit = { ...meta, coverUrl: meta.coverUrl ?? null };
        resultsPanel.classList.remove('visible');
        currentMeta = hit;
        coverBase64 = null;
        populateForm(hit);
        document.getElementById('form-area').style.display = '';

        if (meta.coverUrl) {
          document.getElementById('cover-status').textContent = 'Downloading cover…';
          try {
            coverBase64 = await fetchCoverAsBase64(meta.coverUrl);
            document.getElementById('cover-preview').src = `data:image/webp;base64,${coverBase64}`;
            document.getElementById('cover-status').textContent = 'Cover ready';
          } catch {
            document.getElementById('cover-status').textContent = 'Cover unavailable';
            toast('Could not fetch cover image', 'warning');
          }
        }

        toast(`Found: "${meta.title}"`, 'success');

      } else {
        // ── Title mode: IBS catalogue search ───────────────────────────
        showResultsState('Searching…');

        const hits = await searchIBS(raw);
        renderResults(hits);

        if (hits.length) {
          toast(`${hits.length} result${hits.length > 1 ? 's' : ''} found`, 'success');
        }
      }
    } catch (err) {
      console.error(err);
      showResultsState(`Search failed: ${escHtml(err.message)}`);
      toast('Search failed — check your connection', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Manual entry ──────────────────────────────────────────────────────────

  function openManual(e) {
    if (e) e.preventDefault();
    currentMeta = null; coverBase64 = null;
    resultsPanel.classList.remove('visible');
    ['f-title','f-author','f-year','f-isbn-ro','f-publisher','f-pages','f-description','f-language'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-subject').value = '';
    document.getElementById('cover-preview').src = 'assets/no-cover.svg';
    document.getElementById('cover-status').textContent = '';
    document.getElementById('form-area').style.display = '';
    document.getElementById('f-title').focus();
  }

  document.getElementById('manual-entry-link').addEventListener('click', openManual);

  // ── Cover upload ──────────────────────────────────────────────────────────

  document.getElementById('cover-upload').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('cover-status').textContent = 'Processing…';
    try {
      coverBase64 = await fileToBase64(file);
      document.getElementById('cover-preview').src = `data:image/webp;base64,${coverBase64}`;
      document.getElementById('cover-status').textContent = 'Cover ready';
    } catch (err) {
      console.error(err);
      document.getElementById('cover-status').textContent = 'Failed to load image';
      toast('Could not process cover image', 'error');
    }
  });

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        const dataUrl = canvas.toDataURL('image/webp', 0.85);
        resolve(dataUrl.split(',')[1]);
        URL.revokeObjectURL(img.src);
      };
      img.onerror = () => { URL.revokeObjectURL(img.src); reject(new Error('Invalid image')); };
      img.src = URL.createObjectURL(file);
    });
  }

  // ── Populate form ─────────────────────────────────────────────────────────

  function populateForm(meta) {
    document.getElementById('f-title').value       = meta.title       ?? '';
    document.getElementById('f-author').value      = meta.author      ?? '';
    document.getElementById('f-year').value        = meta.year        ?? '';
    document.getElementById('f-isbn-ro').value     = meta.isbn        ?? '';
    document.getElementById('f-publisher').value   = meta.publisher   ?? '';
    document.getElementById('f-pages').value       = meta.pages       ?? '';
    document.getElementById('f-description').value = meta.description ?? '';
    document.getElementById('f-language').value    = meta.lang        ?? '';

    const metaSubjects = Array.isArray(meta.subjects) ? meta.subjects : [];
    const sel = document.getElementById('f-subject');
    sel.value = '';
    for (const s of metaSubjects) {
      const match = SUBJECTS.find(opt => opt.toLowerCase() === s.toLowerCase());
      if (match) { sel.value = match; break; }
    }
  }

  // ── Save ──────────────────────────────────────────────────────────────────

  document.getElementById('save-btn').addEventListener('click', async () => {
    if (!isConfigured()) { toast('Configure GitHub settings first', 'warning'); return; }

    let isbn     = document.getElementById('f-isbn-ro').value.trim();
    const title  = document.getElementById('f-title').value.trim();
    const author = document.getElementById('f-author').value.trim();

    if (!title) { toast('Title is required', 'warning'); return; }
    if (!isbn)  { isbn = 'no-isbn-' + Date.now().toString(36); }

    const subject  = document.getElementById('f-subject').value;
    const subjects = subject ? [subject] : [];

    const entry = {
      isbn,
      title,
      author,
      year:        parseInt(document.getElementById('f-year').value)  || null,
      cover:       `covers/${isbn}.webp`,
      added:       new Date().toISOString().slice(0, 10),
      publisher:   document.getElementById('f-publisher').value.trim(),
      pages:       parseInt(document.getElementById('f-pages').value) || null,
      lang:        document.getElementById('f-language').value.trim(),
      description: document.getElementById('f-description').value.trim(),
      subjects,
    };

    document.getElementById('save-progress').style.display = '';
    document.getElementById('save-btn').disabled = true;

    const bar    = document.getElementById('progress-bar');
    const status = document.getElementById('save-status');
    const steps  = ['cover', 'grid'];
    let done = 0;
    const updateProgress = (msg) => {
      done++;
      bar.style.width = `${Math.round(done / steps.length * 100)}%`;
      status.textContent = msg;
    };

    try {
      status.textContent = 'Saving…';
      await saveNewBook(entry, coverBase64, 'image/webp');
      updateProgress('Saved! Redirecting…');
      toast(`"${title}" added to your library`, 'success');
      setTimeout(() => window.location.href = 'index.html', 1200);
    } catch (err) {
      console.error(err);
      toast(`Save failed: ${err.message}`, 'error');
      document.getElementById('save-btn').disabled = false;
      status.textContent = `Error: ${err.message}`;
    }
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    document.getElementById('form-area').style.display = 'none';
    resultsPanel.classList.remove('visible');
    searchInput.value   = '';
    searchHint.innerHTML = '&nbsp;';
    document.getElementById('cover-preview').src = 'assets/no-cover.svg';
    currentMeta = null; coverBase64 = null;
  });
</script>

<script src="js/theme.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/books/sw.js");</script>
</body>
</html>
